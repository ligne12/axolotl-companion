repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        # 4 MB — generous enough to admit the Blender-baked mascot GLB
        # (~3.3 MB) without nagging on every re-bake. Anything heavier
        # belongs on a CDN or Git LFS.
        args: [--maxkb=4096]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix]
      - id: ruff-format
        files: ^backend/

  # Prettier runs through the pnpm install in ``frontend/`` so local
  # dev and CI use exactly the same version. ``mirrors-prettier`` is
  # archived upstream and pins to Prettier 4-alpha — that introduced
  # a multi-line-union format that disagreed with the v3 the project
  # has been on, churning the same files on every push.
  #
  # ``pass_filenames: false`` makes the hook fire once per pre-commit
  # invocation; Prettier then walks ``frontend/`` itself, honouring
  # ``frontend/.prettierignore`` (which excludes the generated
  # ``api-generated.ts`` + the public/ assets). Trying to pipe the
  # changed-file list in fails because pre-commit passes paths
  # relative to the repo root while ``--dir frontend`` resolves
  # everything relative to ``frontend/``.
  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend, via pnpm)
        language: system
        entry: bash -c 'cd frontend && pnpm exec prettier --write .'
        files: ^frontend/.*\.(ts|tsx|js|jsx|css|json|ya?ml|md)$
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

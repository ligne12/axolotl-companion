# =============================================================================
# Production overrides
#
# Usage:
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
# =============================================================================

services:
  backend:
    build:
      target: production
    command: >
      uvicorn axolotl.main:app
      --host 0.0.0.0
      --port 8001
      --workers 4
    environment:
      - ENV=production
      - LOG_LEVEL=info
    volumes: []
    restart: always

  frontend:
    build:
      target: production
    volumes: []
    restart: always

  postgres:
    restart: always

  redis:
    restart: always

  vllm:
    restart: always

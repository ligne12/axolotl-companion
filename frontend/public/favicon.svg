<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Tab favicon — tighter version of the home-screen icon. Lime tile
       centred, custom flat lotus on top so it still reads as the brand
       mark even at 16×16. -->
  <rect width="32" height="32" rx="6" fill="#f6f2e6"/>
  <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="#1a1610" stroke-width="2"/>
  <rect x="10" y="10" width="16" height="16" rx="3" fill="#1a1610"/>
  <rect x="8" y="8" width="16" height="16" rx="3" fill="#baff39" stroke="#1a1610" stroke-width="2"/>
  <g transform="translate(16 16)" stroke="#1a1610" stroke-width="1" stroke-linejoin="round">
    <g fill="#e87b9a">
      <ellipse cx="0" cy="-3.6" rx="1.7" ry="3"/>
      <ellipse cx="0" cy="-3.6" rx="1.7" ry="3" transform="rotate(72)"/>
      <ellipse cx="0" cy="-3.6" rx="1.7" ry="3" transform="rotate(144)"/>
      <ellipse cx="0" cy="-3.6" rx="1.7" ry="3" transform="rotate(216)"/>
      <ellipse cx="0" cy="-3.6" rx="1.7" ry="3" transform="rotate(288)"/>
    </g>
    <circle cx="0" cy="0" r="1.6" fill="#f5d56a"/>
  </g>
</svg>

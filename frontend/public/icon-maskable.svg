<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" role="img" aria-label="Axolotl Companion">
  <title>Axolotl Companion</title>
  <!-- Maskable variant: full-bleed cream background; the brand mark sits in
       the safe zone (centred 80 % of the canvas) so Android's adaptive icon
       mask doesn't crop it. -->
  <rect width="192" height="192" fill="#f6f2e6"/>
  <!-- L-shape offset shadow -->
  <rect x="80" y="84" width="60" height="60" rx="8" fill="#1a1610"/>
  <!-- Lime accent tile, ink-bordered -->
  <rect x="74" y="78" width="60" height="60" rx="8" fill="#baff39" stroke="#1a1610" stroke-width="5"/>
</svg>

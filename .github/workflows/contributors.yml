name: Contributors

# Refreshes the README's <!-- CONTRIBUTORS --> section from the git log.
# Triggers on push to main (after a feature branch lands) and weekly as a
# safety net. The bot commit is signed by the GitHub Actions identity and
# does NOT reset the contributors section, so it preserves any future
# manual ordering tweaks that the script doesn't undo.

on:
  push:
    branches: [main]
  schedule:
    # Sunday 05:00 UTC — picks up trailers from any commit landing
    # outside the normal push path (mirrors, force-push restores).
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contributors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Guard against the workflow re-triggering itself: when the bot
    # pushes the refreshed README, the resulting push event has
    # ``github_actions[bot]`` as actor and we skip it.
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the script sees every Co-Authored-By trailer.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh contributors section
        run: python3 .github/scripts/update_contributors.py

      - name: Commit & push if README changed
        run: |
          if git diff --quiet README.md; then
            echo "README already up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): refresh contributors section [skip ci]"
          git push

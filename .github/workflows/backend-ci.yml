name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: axolotl
          POSTGRES_PASSWORD: axolotl
          POSTGRES_DB: axolotl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://axolotl:axolotl@localhost:5432/axolotl_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_at_least_32_chars_long_xxxxx
          FERNET_KEY: test_fernet_key_at_least_32_chars_xxxxx
        run: uv run pytest

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage.xml
          flags: backend
        continue-on-error: true

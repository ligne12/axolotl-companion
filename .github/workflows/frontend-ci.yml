name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "frontend/**"
      - "backend/openapi.json"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/openapi.json"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./frontend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: TS type drift check
        run: |
          pnpm gen:api-types
          git diff --exit-code src/types/api-generated.ts \
            || (echo "✗ api-generated.ts is out of date. Run 'make gen-api-types' and commit."; exit 1)

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

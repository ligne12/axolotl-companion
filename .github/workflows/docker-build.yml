name: Docker build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker/**"
      - "compose.yaml"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # ``security-events: write`` lets the SARIF upload land in the
      # GitHub Code-scanning tab so Trivy findings have a permanent home
      # instead of being buried in the build log.
      security-events: write
    strategy:
      matrix:
        target:
          - { name: backend, context: ./backend, dockerfile: ./backend/Dockerfile, stage: production }
          - { name: frontend, context: ./frontend, dockerfile: ./frontend/Dockerfile, stage: production }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/axolotl-${{ matrix.target.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.target.context }}
          file: ${{ matrix.target.dockerfile }}
          target: ${{ matrix.target.stage }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,scope=${{ matrix.target.name }},mode=max

      - name: Scan image for vulnerabilities
        id: trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/axolotl-${{ matrix.target.name }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.target.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        # Don't block deploys on upstream CVEs — Trivy results land in
        # the Code-scanning tab via the upload step below and the SARIF
        # build-up is still observable on every push.
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.target.name }}.sarif
          category: trivy-${{ matrix.target.name }}
        continue-on-error: true
